[build]
  publish = "."

# ── HTML — no cache (always fresh)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── CSS / JS — no cache (versioned via ?v= query string in HTML)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/js/*.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# ── Libraries — long cache (filenames never change)
[[headers]]
  for = "/lib/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

# ── Images — long cache
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

# ── Favicon
[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Admin (CMS) — no cache
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
