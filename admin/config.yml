# ============================================================
# Decap CMS — Melkitzedek Church Website
# Docs: https://decapcms.org/docs/
#
# HOW IT WORKS:
#   - Staff log in at /admin using their Netlify Identity account
#   - Changes are committed to GitHub automatically
#   - Netlify redeploys the site on each commit
# ============================================================

backend:
  name: git-gateway
  branch: main   # Change to your default branch if different

# Local development: run `npx decap-server` to use local backend
# local_backend: true

media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"

collections:

  # ── SITE SETTINGS ───────────────────────────────────────
  - name: "settings"
    label: "Site Settings"
    files:

      - name: "general"
        label: "General Settings"
        file: "_data/settings.json"
        fields:
          - { label: "Church Name", name: "church_name", widget: "string", default: "Melkitzedek" }
          - { label: "Tagline", name: "tagline", widget: "string", default: "Faith. Hope. Community." }
          - { label: "Location", name: "location", widget: "string", default: "Tegucigalda, Honduras" }
          - { label: "Email", name: "email", widget: "string", default: "info@melkitzedek.com" }
          - { label: "Phone", name: "phone", widget: "string", default: "+504 0000-0000" }
          - { label: "Address", name: "address", widget: "string", default: "123 Church Street, Tegucigalda" }
          - { label: "Sunday Service Time", name: "sunday_time", widget: "string", default: "10:00 AM" }
          - { label: "Wednesday Study Time", name: "wednesday_time", widget: "string", default: "7:00 PM" }
          - { label: "TuneIn Radio URL", name: "radio_url", widget: "string", default: "https://tunein.com/radio/Melki-Tzedekradio/" }
          - { label: "Facebook URL", name: "facebook_url", widget: "string", required: false }
          - { label: "Instagram URL", name: "instagram_url", widget: "string", required: false }
          - { label: "YouTube URL", name: "youtube_url", widget: "string", required: false }

      - name: "hero"
        label: "Hero Section"
        file: "_data/hero.json"
        fields:
          - { label: "Eyebrow Text", name: "eyebrow", widget: "string", default: "Welcome Home" }
          - { label: "Headline", name: "headline", widget: "string", default: "You're Invited" }
          - { label: "Headline Italic Word", name: "headline_italic", widget: "string", default: "Invited" }
          - { label: "Subheading", name: "subheading", widget: "text", default: "A community of faith, hope, and purpose." }
          - { label: "Primary CTA Text", name: "cta_primary", widget: "string", default: "Plan a visit" }
          - { label: "Secondary CTA Text", name: "cta_secondary", widget: "string", default: "Watch a sermon" }
          - { label: "Background Image", name: "bg_image", widget: "image", required: false }

      - name: "about"
        label: "About Section"
        file: "_data/about.json"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string", default: "You Belong Here" }
          - { label: "Headline", name: "headline", widget: "string", default: "Everyone is welcome, nobody is perfect" }
          - { label: "Body (paragraph 1)", name: "body_1", widget: "text" }
          - { label: "Body (paragraph 2)", name: "body_2", widget: "text" }
          - { label: "CTA Button Text", name: "cta", widget: "string", default: "Learn about us" }
          - { label: "Photo", name: "photo", widget: "image", required: false }
          - { label: "Photo Alt Text", name: "photo_alt", widget: "string", default: "Our congregation" }

  # ── SERMONS ─────────────────────────────────────────────
  - name: "sermons"
    label: "Sermons"
    folder: "_data/sermons"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "MMMM D, YYYY", time_format: false }
      - { label: "Pastor / Speaker", name: "pastor", widget: "string" }
      - { label: "Scripture Reference", name: "scripture", widget: "string" }
      - { label: "Video URL (YouTube, Vimeo, etc.)", name: "video_url", widget: "string", required: false }
      - { label: "Thumbnail Image", name: "thumbnail", widget: "image", required: false }
      - { label: "Description (optional)", name: "description", widget: "text", required: false }
      - { label: "Published", name: "published", widget: "boolean", default: true }

  # ── EVENTS ──────────────────────────────────────────────
  - name: "events"
    label: "Events"
    folder: "_data/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "MMMM D, YYYY", time_format: false }
      - { label: "Time", name: "time", widget: "string", hint: "e.g. 10:00 AM" }
      - { label: "Location", name: "location", widget: "string", hint: "e.g. Main Sanctuary" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Published", name: "published", widget: "boolean", default: true }

  # ── PAGES (rich content) ─────────────────────────────────
  - name: "pages"
    label: "Pages"
    files:

      - name: "contact"
        label: "Contact Page"
        file: "_data/contact.json"
        fields:
          - { label: "Section Eyebrow", name: "eyebrow", widget: "string", default: "Come Find Us" }
          - { label: "Section Headline", name: "headline", widget: "string", default: "Visit Melkitzedek" }
          - { label: "Form Heading", name: "form_heading", widget: "string", default: "Send us a message" }
